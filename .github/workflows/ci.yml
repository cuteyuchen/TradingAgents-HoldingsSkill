name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/v2-foundation

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    env:
      APP_SECRET_KEY: ci-secret-key-at-least-32-bytes-long
      ADVISOR_TOKEN: ci-legacy-token
      ADVISOR_SQLITE_JOURNAL_MODE: MEMORY
      SCHEDULER_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -q -r requirements.txt pytest
      - name: Check Alembic migrations
        run: |
          export ADVISOR_DB_PATH="$RUNNER_TEMP/alembic-ci.db"
          alembic upgrade head > "$RUNNER_TEMP/alembic.log" 2>&1
          alembic upgrade head >> "$RUNNER_TEMP/alembic.log" 2>&1
      - name: Run backend tests
        shell: bash
        run: |
          set +e
          pytest tests -q --tb=short > "$RUNNER_TEMP/backend-tests.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/backend-tests.log"
          exit $status
      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-diagnostics
          path: |
            ${{ runner.temp }}/backend-tests.log
            ${{ runner.temp }}/alembic.log
          if-no-files-found: ignore
          retention-days: 3

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --silent --no-audit --no-fund
      - name: Typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > "$RUNNER_TEMP/frontend-typecheck.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/frontend-typecheck.log"
          exit $status
      - name: Build
        shell: bash
        run: |
          set +e
          npm run build > "$RUNNER_TEMP/frontend-build.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/frontend-build.log"
          exit $status
      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-diagnostics
          path: |
            ${{ runner.temp }}/frontend-typecheck.log
            ${{ runner.temp }}/frontend-build.log
          if-no-files-found: ignore
          retention-days: 3

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build containers
        shell: bash
        run: |
          set +e
          docker compose build --progress=plain > "$RUNNER_TEMP/docker-build.log" 2>&1
          status=$?
          tail -n 200 "$RUNNER_TEMP/docker-build.log"
          exit $status
      - name: Upload Docker diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-diagnostics
          path: ${{ runner.temp }}/docker-build.log
          if-no-files-found: ignore
          retention-days: 3
